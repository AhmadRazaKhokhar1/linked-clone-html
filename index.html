                    </div>
                    <div class="outer-circle-profile-photo-sidebar">
                        <div class="profile-photo-container-sidebar hide-outer-elements">
                            <img src="./assets/ahmad.jpeg" alt="Ahmad" class="profile-photo-sidebar">
                        </div>
                    </div>
                </div>
               <div class="profile-info-and-company-container">
                 <div class="profile-info-siebar">
                    <span class="profile-name-sidebar">
                        Ahmad Raza... <svg xmlns="http://www.w3.org/2000/svg" id="verified-small" fill="currentColor" aria-hidden="false" data-supported-dps="16x16" viewBox="0 0 16 16" data-token-id="304" width="16" height="16" class="_85b5b448 _689cd47a e7c43788" role="img" aria-label="Verified profile" style="width: 16px; min-width: 16px; height: 16px; min-height: 16px;"><path d="m8 15-.86-.29C3.24 13.41 1 10.62 1 7V2.49L8 0l7 2.49V7c0 3.62-2.23 6.41-6.13 7.71zM3 3.9V7c0 3.53 2.6 5.09 4.78 5.82l.23.08.23-.08C10.01 12.23 13 10.71 13 7V3.9L8 2.11zM9.43 5 7.01 8.02l-1.1-1.1L4.5 8.34l2.67 2.67 4.83-6H9.43z"></path></svg>

                <div class="company-info-siebar">
                    <div class="company-img-conatiner-sidebar">
                        <img src="./assets/techonskills-logo-linkedin.jpeg" alt="company logo" class="company-img-sidebar">
                    </div>
                    <span class="company-name-sidebar">
                        TechonSkills
                    </span>
                </div>
               </div>
            </div>
            <div class="sidebar-section-2 sidebar-border-rounded hide-outer-elements"></div>
            <div class="sidebar-section-3 sidebar-border-rounded hide-outer-elements"></div>
            <div class="sidebar-section-4 sidebar-border-rounded hide-outer-elements"></div>
        </section>
        <section class="body-section-2"></section>
        <section class="body-section-3"></section>
    </main>
